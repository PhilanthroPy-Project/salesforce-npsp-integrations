[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "salesforce-npsp-core"
version = "0.1.0"
description = "Framework-neutral Salesforce Nonprofit Success Pack (NPSP) donor reader. Shared core for the Haystack and MCP integrations."
authors = [{name = "Shivam Ashokbhai Lalakiya", email = "Shivamlalakiya151299@gmail.com"}]
requires-python = ">=3.10"
readme = "README.md"
license = "MIT"
dependencies = [
    "simple-salesforce>=1.12.5",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["npsp_core"]
