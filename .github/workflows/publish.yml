name: Publish to PyPI

# Fires when a GitHub Release (tag v*.*.*) is published — pushing a tag alone
# does nothing, matching the PhilanthroPy release convention.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      # Publish core first so the adapters resolve against it on PyPI.
      max-parallel: 1
      matrix:
        include:
          - package: packages/npsp-core
            environment: pypi
          - package: packages/haystack-salesforce-npsp
            environment: pypi-haystack
          - package: packages/mcp-server-salesforce-npsp
            environment: pypi-mcp
    # Each package uses a DISTINCT environment so its PyPI *pending* trusted
    # publisher is unique on (owner, repo, workflow, environment). One shared
    # environment collides — PyPI rejects the 2nd/3rd pending publisher with
    # "already registered for a different project name".
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write  # OIDC — Trusted Publishing, no token/secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build ${{ matrix.package }}
        run: |
          python -m pip install --upgrade build
          python -m build --outdir dist "${{ matrix.package }}"
      - name: Publish ${{ matrix.package }}
        uses: pypa/gh-action-pypi-publish@release/v1
